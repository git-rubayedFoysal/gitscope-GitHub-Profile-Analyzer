<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gitscope</title>
    <link rel="shortcut icon" href="./icon/favicon.svg" type="image/x-icon" />
    <link rel="stylesheet" href="./style.css" />
    <script
      src="https://kit.fontawesome.com/19ae868886.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <!-- header section -->
    <header id="header">
      <div class="container">
        <div class="wrapper">
          <div class="brand">
            <a href="./index.html">
              <img id="brand-logo" src="./icon/brand-icon-teal.svg" alt="" />
              <span id="brand-name">git<span id="subBrand">scope</span></span>
            </a>
          </div>
          <div class="theme">
            <button id="themeToggle" onclick="toggleTheme()">
              <img src="./icon/dark_mode.svg" alt="" id="img-toggle" />
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- banner section start -->
    <section id="banner">
      <div class="container">
        <div class="bannerWrapper">
          <h1>
            <span><i class="fa-brands fa-github"></i></span>GitHub Profile
            Analyzer
          </h1>
          <p>Analyze your GitHub profile and repositories</p>
        </div>
      </div>
    </section>
    <!-- banner section end -->

    <!-- search bar section -->
    <section id="searchBar">
      <div class="container">
        <div class="searchWrapper">
          <div class="mainbar">
            <p>$ gh user</p>
            <form id="search">
              <input
                type="text"
                name="username"
                id="username"
                placeholder="Enter GitHub username.."
              />

              <button id="searchBtn" type="submit">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 -960 960 960"
                  class="enterSvg"
                >
                  <path
                    d="M400-120 160-360l241-241 56 57-144 144h367v-400h80v480H313l144 143-57 57Z"
                  />
                </svg>
                <span class="enter">analyze</span>
              </button>
            </form>
          </div>
        </div>
        <!-- error banner -->
        <div
          id="error-banner"
          style="
            display: none;
            background: #1a0808;
            border: 1px solid #f8717130;
            border-radius: var(--radius-md);
            padding: 10px 14px;
            margin: 16px 0;
            font-family: var(--font-mono);
            font-size: 12px;
            color: #f87171;
          "
        ></div>
      </div>
    </section>

    <div id="data" style="display: none">
      <!-- mainContent -->
      <section id="mainMenu">
        <div class="container">
          <div class="wrapper-main">
            <div class="profile-menu">
              <div class="avatar">
                <div class="avatar-ring">
                  <img src="" alt="" id="p-img" />
                </div>
              </div>

              <div class="profile-detaits">
                <h2 id="p-name"></h2>
                <p id="p-username"></p>
                <div class="location">
                  <div class="location-dot"></div>
                  <p id="p-location"></p>
                </div>
                <p id="p-bio"></p>

                <div class="inner">
                  <div class="card-inner">
                    <p id="p-follower"></p>
                    <p class="p-para">Followers</p>
                  </div>
                  <div class="card-inner">
                    <p id="p-following"></p>
                    <p class="p-para">Following</p>
                  </div>
                  <div class="card-inner">
                    <p id="p-repo"></p>
                    <p class="p-para">Repos</p>
                  </div>
                  <div class="card-inner">
                    <p id="p-joined"></p>
                    <p class="p-para">Joined</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- outer card section -->
      <section id="outCard">
        <div class="container">
          <div class="outer">
            <div class="card-outer">
              <p class="p-para">⭐</p>
              <p id="p-star"></p>
              <p class="p-para para-top">Total Stars</p>
            </div>
            <div class="card-outer">
              <p class="p-para">🍴</p>
              <p id="p-fork"></p>
              <p class="p-para para-top">total forks</p>
            </div>
            <div class="card-outer">
              <p class="p-para">🔥</p>
              <p id="p-top-repo"></p>
              <p class="p-para para-top">Top Repos</p>
            </div>
            <div class="card-outer">
              <p class="p-para">🕒</p>
              <p id="p-last-active"></p>
              <p class="p-para para-top">Last Active</p>
            </div>
          </div>
        </div>
      </section>

      <section id="contributionChart">
        <div class="container">
          <img src="" id="contribution" />
        </div>
      </section>

      <section id="reposSection">
        <div class="container">
          <div class="two-col">
            <div class="languages-card">
              <h3>
                Languages
                <span style="font-size: 0.75rem; text-transform: lowercase"
                  >-by repo count</span
                >
              </h3>

              <template id="langTem">
                <div class="lang">
                  <div class="lang-top">
                    <span class="lang-name"></span>
                    <span class="lang-per"></span>
                  </div>
                  <div class="progress">
                    <div class="bar"></div>
                  </div>
                </div>
              </template>

              <div class="lang-list"></div>
            </div>

            <div class="repo-card">
              <!-- Header -->
              <div class="repo-header">
                <h3>Repositories</h3>
              </div>

              <!-- Repo List -->
              <template id="repoTem">
                <div class="repo">
                  <h4 class="repo-name"></h4>
                  <p class="repo-des"></p>

                  <div class="repo-meta">
                    <span>⭐ <span class="repo-star"></span></span>
                    <span>🍴 <span class="repo-fork"></span></span>
                    <span class="lang-dot c"></span>
                    <span class="lang-name"></span>
                  </div>
                </div>
              </template>
              <div class="repo-list"></div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <footer id="footer">
      <div class="container">
        <div class="footWrapper">
          <p>Rubayed Ahmed Foysal</p>
          <span>|</span>
          <a href="https://github.com/git-rubayedFoysal" target="_blank"
            ><i class="fa-brands fa-github"></i>git-rubayedFoysal</a
          >
        </div>
      </div>
    </footer>
    <script src="./script.js" defer></script>
  </body>
</html>
